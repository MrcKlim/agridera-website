<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Agridera</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/middle.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body class="contact-page">

    <header class="header-section header-white">
        <div class="container">
            <div class="row pt-3 pb-2 align-items-center">
                <div class="col-md-3 text-center text-md-left mb-3 mb-md-0">
                    <a href="index.html">
                        <img src="images/logo.png" alt="Agridera Logo" class="img-fluid logo-img">
                    </a>
                </div>
                <div class="col-md-9">
                    <div class="d-flex justify-content-md-end justify-content-center mb-2">
                        <div class="search-box">
                            <input type="text" placeholder="Search">
                            <img src="images/ico_search.png" alt="Search" class="search-icon-img">
                        </div>
                    </div>
                    <nav class="main-nav d-flex justify-content-md-end justify-content-center flex-wrap">
                        <a href="index.html">Home</a>
                        <a href="#">Company Profile</a>
                        <a href="tomato.html">Products</a>
                        <a href="#">Services</a>
                        <a href="#">R & D</a>
                        <a href="contact.html">Contact</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <div class="contact-banner">
        <img src="images/image 7.jpg" alt="Contact Banner">
    </div>

    <section class="contact-section py-5">
        <div class="container">
            <h2 class="contact-title">Contact us</h2>
            <img src="images/Union.svg" alt="Crosses" class="crosses-img">

            <div class="row">
                <div class="col-md-5">
                    <div class="form-group">
                        <label class="contact-label">Name <span class="required">*</span></label>
                        <input type="text" class="contact-input form-control">
                    </div>
                    <div class="form-group">
                        <label class="contact-label">Company Name</label>
                        <input type="text" class="contact-input form-control">
                    </div>
                    <div class="form-group">
                        <label class="contact-label">Position</label>
                        <input type="text" class="contact-input form-control">
                    </div>
                    <div class="form-group">
                        <label class="contact-label">City</label>
                        <input type="text" class="contact-input form-control">
                    </div>
                    <div class="form-group">
                        <label class="contact-label">Country</label>
                        <input type="text" class="contact-input form-control">
                    </div>
                    <div class="form-group">
                        <label class="contact-label">Telephone</label>
                        <input type="text" class="contact-input form-control">
                    </div>
                    <div class="form-group">
                        <label class="contact-label">Email <span class="required">*</span></label>
                        <input type="email" class="contact-input form-control" placeholder=" " required>                    </div>
                </div>

                <div class="col-md-6 offset-md-1">
                    <div class="form-group">
                        <label class="contact-label">You are a</label>
                        <select class="contact-input form-control contact-select">
                            <option>seed producer</option>
                            <option>distributor</option>
                            <option>farmer</option>
                            <option>other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="contact-label">If other, please specify</label>
                        <input type="text" class="contact-input form-control">
                    </div>
                    <div class="form-group">
                        <label class="contact-label">You are interested in</label>
                        <textarea class="contact-input form-control contact-textarea"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="contact-label">Please type this code</label>
                        <div class="d-flex align-items-center" style="gap: 8px;">
                            <img src="images/image 12.png" alt="Captcha code" class="captcha-img">
                            <input type="text" class="contact-input captcha-input" style="flex: 0 0 110px;">
                            <button type="submit" class="btn send-btn">Send Message</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="address-block text-center">
        <h5 class="address-title">Our Address</h5>
        <p class="address-text">AGRIDERA Seeds & Agriculture Ltd.<br>
        PO Box 103,<br>
        Gedera 70750, Israel<br>
        Telephone: <a href="tel:+97289449222" class="address-phone">+972 8 944 9222</a></p>
    </div>

    <footer class="footer-section">
        <div class="footer-top py-4">
            <div class="container">
                <div class="row text-center text-md-left align-items-center">
                    <div class="col-md-8 mb-3 mb-md-0">
                        <nav class="footer-nav">
                            <a href="#">PROFILE</a>
                            <a href="#">MANAGEMENT</a>
                            <a href="tomato.html">PRODUCTS</a>
                            <a href="#">R&D</a>
                            <a href="#">LINKS</a>
                            <a href="#">SITEMAP</a>
                            <a href="contact.html">CONTACT</a>
                        </nav>
                    </div>
                    <div class="col-md-4 text-center text-md-right social-icons">
                        <a href="#"><img src="images/Ico_in.png" alt="LinkedIn"></a>
                        <a href="#"><img src="images/Ico_inst.png" alt="Instagram"></a>
                        <a href="#"><img src="images/Ico_tube.png" alt="YouTube"></a>
                        <a href="#"><img src="images/Ico_tw.png" alt="Twitter"></a>
                        <a href="#"><img src="images/Ico_fb.png" alt="Facebook"></a>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer-bottom py-3">
            <div class="container">
                <div class="row">
                    <div class="col-12 text-center">
                        <p class="copyright-text mb-0">AGRIDERA SEEDS & AGRICULTURE LTD. © 2020</p>
                    </div>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
